<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allosticker — Nouveau mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f14;--card:#1e1e28;--yellow:#FFD93D;--orange:#FF6B35;--pink:#FF3D7F;--green:#3DFFB0;--text:#F0EFF6;--muted:#8585a0;--border:rgba(255,255,255,.07)}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.1;animation:bf 8s ease-in-out infinite}
.b1{width:350px;height:350px;background:var(--yellow);top:-80px;left:-80px}
.b2{width:250px;height:250px;background:var(--pink);bottom:-60px;right:-60px;animation-delay:-3s}
@keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-10px)}}
.wrap{width:100%;max-width:400px;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0}
.logo{font-family:'Bangers',cursive;font-size:36px;letter-spacing:2px;color:var(--yellow);text-shadow:3px 3px 0 var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.logo img{width:36px;height:36px;border-radius:9px}
.logo span{color:var(--text)}
.sub{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:28px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;display:flex;flex-direction:column;gap:16px}
.card h2{font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;text-align:center}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.input-wrap{display:flex;align-items:center;gap:10px;background:#0f0f14;border:1.5px solid var(--border);border-radius:13px;padding:13px 16px;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(255,217,61,.5);box-shadow:0 0 0 3px rgba(255,217,61,.08)}
.input-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700}
.input-wrap input::placeholder{color:var(--muted)}
.toggle{cursor:pointer;font-size:15px;color:var(--muted)}
.btn{width:100%;padding:15px;background:var(--yellow);color:#0f0f14;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;border:none;border-radius:13px;cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:13px;font-weight:700;text-align:center;padding:10px;border-radius:10px;display:none}
.msg.ok{background:rgba(61,255,176,.1);border:1px solid rgba(61,255,176,.3);color:var(--green);display:block}
.msg.err{background:rgba(255,61,127,.1);border:1px solid rgba(255,61,127,.3);color:var(--pink);display:block}
.hint{font-size:11px;color:var(--pink);font-weight:700}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="logo">
    <img src="/allosticker-icon-512.png" alt="">
    Allo<span>sticker</span>
  </div>
  <div class="sub">Réinitialisation du mot de passe</div>
  <div class="card">
    <h2>🔑 Nouveau mot de passe</h2>
    <div class="field">
      <div class="label">Nouveau mot de passe</div>
      <div class="input-wrap">
        <span style="font-size:16px">🔒</span>
        <input type="password" id="pwd1" placeholder="8 caractères minimum">
        <span class="toggle" onclick="toggle('pwd1',this)">👁️</span>
      </div>
    </div>
    <div class="field">
      <div class="label">Confirmer le mot de passe</div>
      <div class="input-wrap">
        <span style="font-size:16px">🔒</span>
        <input type="password" id="pwd2" placeholder="Répète le mot de passe">
        <span class="toggle" onclick="toggle('pwd2',this)">👁️</span>
      </div>
      <div class="hint" id="match-hint" style="display:none">Les mots de passe ne correspondent pas</div>
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn" id="btn-save" onclick="savePassword()">🔑 Enregistrer le nouveau mot de passe</button>
    <div style="text-align:center;font-size:13px;color:var(--muted);font-weight:700">
      <a href="/app.html" style="color:var(--yellow);text-decoration:none">← Retour à l'app</a>
    </div>
  </div>
</div>
<script>
const{createClient}=supabase;
const sb=createClient(
  'https://gyierirtxsroaqlaphax.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aWVyaXJ0eHNyb2FxbGFwaGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NzE0OTQsImV4cCI6MjA5NDU0NzQ5NH0.i5YjOBIDKFdZ4QXuFvV2r8ARuJBpNJUI010H86mOn30'
);

function toggle(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁️':'🙈';}

document.getElementById('pwd2').addEventListener('input',()=>{
  const p1=document.getElementById('pwd1').value;
  const p2=document.getElementById('pwd2').value;
  const hint=document.getElementById('match-hint');
  if(p2&&p1!==p2) hint.style.display='block';
  else hint.style.display='none';
});

async function savePassword(){
  const p1=document.getElementById('pwd1').value;
  const p2=document.getElementById('pwd2').value;
  const btn=document.getElementById('btn-save');
  const msg=document.getElementById('msg');
  msg.className='msg';msg.textContent='';

  if(p1.length<8){showMsg('Le mot de passe doit faire au moins 8 caractères','err');return;}
  if(p1!==p2){showMsg('Les mots de passe ne correspondent pas','err');return;}

  btn.disabled=true;btn.textContent='⏳ Sauvegarde…';
  const{error}=await sb.auth.updateUser({password:p1});
  btn.disabled=false;btn.textContent='🔑 Enregistrer le nouveau mot de passe';

  if(error){showMsg('Erreur : '+error.message,'err');return;}
  showMsg('✓ Mot de passe mis à jour ! Redirection…','ok');
  setTimeout(()=>window.location.href='/app.html',2000);
}

function showMsg(txt,type){
  const msg=document.getElementById('msg');
  msg.textContent=txt;
  msg.className='msg '+type;
}
</script>
</body>
</html>
